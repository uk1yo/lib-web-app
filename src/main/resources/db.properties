# ============================================================
# Database connection settings for CustomConnectionPool
# ============================================================

# JDBC connection URL — update host/port/dbname for your environment
db.url=jdbc:postgresql://localhost:5432/library_db
db.username=library_user
db.password=library_pass
db.driver=org.postgresql.Driver

# Pool settings
# Number of physical connections to maintain
db.pool.size=10
# Max time (ms) a thread waits for an available connection before DatabaseException
db.pool.timeout.ms=5000
