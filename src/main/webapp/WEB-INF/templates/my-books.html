<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(#{nav.borrow})}"></head>
<body>
<div th:replace="~{layout/fragments :: navbar}"></div>

<div class="container mt-4">
    <h2 th:text="#{nav.borrow}">My Borrows</h2>
    
    <div th:replace="~{layout/fragments :: flash-messages}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Book</th>
                    <th>Type</th>
                    <th>Borrow Date</th>
                    <th>Due Date</th>
                    <th>Return Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="borrow : ${borrows}">
                    <td th:text="${borrow.book.title}">Book Title</td>
                    <td th:text="#{'lending.type.' + ${borrow.lendingType}}">Home</td>
                    <td th:text="${borrow.borrowDate}">2025-01-01</td>
                    <td th:text="${borrow.dueDate}">2025-01-15</td>
                    <td th:text="${borrow.returnDate != null ? borrow.returnDate : '-'}">-</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${borrow.status.name() == 'PENDING_APPROVE' ? 'bg-warning text-dark' : 
                                              (borrow.status.name() == 'BORROWED' ? 'bg-primary' : 
                                              (borrow.status.name() == 'RETURNED' ? 'bg-success' : 
                                              (borrow.status.name() == 'REJECTED' or borrow.status.name() == 'CANCELLED' ? 'bg-danger' : 'bg-secondary')))}"
                              th:text="#{'borrow.status.' + ${borrow.status}}">Status</span>
                    </td>
                    <td>
                        <form th:if="${borrow.status.name() == 'PENDING_APPROVE'}" 
                              th:action="@{/borrows/{id}/cancel(id=${borrow.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger">Cancel</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(borrows)}">
                    <td colspan="7" class="text-center text-muted">You have no borrow records.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{layout/fragments :: footer}"></div>
</body>
</html>
