<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Library App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

<header th:fragment="navbar" class="p-3 bg-dark text-white mb-4">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none me-3">
                <i class="bi bi-book-half fs-4 me-2"></i>
                <span class="fs-5" th:text="#{app.name}">Library System</span>
            </a>

            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/catalog" class="nav-link px-2 text-white" th:text="#{nav.books}">Books</a></li>
                <li th:if="${session.user != null and session.user.role == 'READER'}">
                    <a href="/my-books" class="nav-link px-2 text-white" th:text="#{nav.borrow}">My Borrows</a>
                </li>
                <li th:if="${session.user != null and session.user.role == 'LIBRARIAN'}">
                    <a href="/librarian" class="nav-link px-2 text-white">Librarian Panel</a>
                </li>
                <li th:if="${session.user != null and session.user.role == 'ADMIN'}">
                    <a href="/admin" class="nav-link px-2 text-white" th:text="#{nav.admin}">Admin Panel</a>
                </li>
            </ul>

            <div class="dropdown me-3">
                <button class="btn btn-secondary dropdown-toggle" type="button" id="langDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-globe"></i>
                </button>
                <ul class="dropdown-menu" aria-labelledby="langDropdown">
                    <li><a class="dropdown-item" href="?lang=en">English</a></li>
                    <li><a class="dropdown-item" href="?lang=ru">Русский</a></li>
                    <li><a class="dropdown-item" href="?lang=kz">Қазақша</a></li>
                </ul>
            </div>

            <div class="text-end" th:if="${session.user == null}">
                <a href="/login" class="btn btn-outline-light me-2" th:text="#{nav.login}">Login</a>
                <a href="/register" class="btn btn-warning" th:text="#{nav.register}">Register</a>
            </div>
            <div class="text-end dropdown" th:if="${session.user != null}">
                <button class="btn btn-outline-light dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false" th:text="${session.user.firstName + ' ' + session.user.lastName}">
                    User
                </button>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                    <li><a class="dropdown-item" href="/logout" th:text="#{nav.logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</header>

<div th:fragment="flash-messages" class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">Success!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">Error!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<footer th:fragment="footer" class="py-3 my-4 border-top">
    <div class="container text-center text-muted">
        <span th:text="#{app.footer}">&copy; 2025 Library Web App</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
