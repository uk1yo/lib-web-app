<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(#{auth.register.title})}"></head>
<body>
<div th:replace="~{layout/fragments :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h2 class="mb-4 text-center" th:text="#{auth.register.title}">Create Account</h2>

            <div th:replace="~{layout/fragments :: flash-messages}"></div>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="card p-4 shadow-sm">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" id="firstName" class="form-control" th:field="*{firstName}" 
                               th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''" required minlength="2" maxlength="50">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" id="lastName" class="form-control" th:field="*{lastName}" 
                               th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''" required minlength="2" maxlength="50">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}" 
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label" th:text="#{auth.login.password}">Password</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" required minlength="6">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required minlength="6">
                    <div class="invalid-feedback" id="confirmPasswordFeedback">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100" th:text="#{auth.register.submit}">Register</button>

                <div class="mt-3 text-center">
                    <a href="/login">Already have an account? Sign In</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{layout/fragments :: footer}"></div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector('form');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const email = document.getElementById('email');

        form.addEventListener('submit', function (event) {
            let valid = true;

            // Password match check
            if (password.value !== confirmPassword.value) {
                confirmPassword.classList.add('is-invalid');
                valid = false;
            } else {
                confirmPassword.classList.remove('is-invalid');
                confirmPassword.classList.add('is-valid');
            }

            // Simple Email Regex Check (custom fallback even if HTML5 catches it)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                email.classList.add('is-invalid');
                valid = false;
            } else {
                email.classList.remove('is-invalid');
                email.classList.add('is-valid');
            }

            // If custom checks failed or standard HTML5 checks failed
            if (!valid || !form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }

            form.classList.add('was-validated');
        }, false);

        // Remove invalid class instantly as user types matching password
        confirmPassword.addEventListener('input', function() {
            if (password.value === confirmPassword.value) {
                confirmPassword.classList.remove('is-invalid');
            }
        });
    });
</script>

</body>
</html>
