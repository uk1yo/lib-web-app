<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(#{auth.login.title})}"></head>
<body>
<div th:replace="~{layout/fragments :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <h2 class="mb-4 text-center" th:text="#{auth.login.title}">Sign In</h2>

            <div th:replace="~{layout/fragments :: flash-messages}"></div>

            <form th:action="@{/login}" method="post" class="card p-4 shadow-sm">
                
                <div th:if="${param.error}" class="alert alert-danger">
                    Invalid email or password.
                </div>
                <div th:if="${param.locked}" class="alert alert-danger">
                    Your account has been locked. Please contact the administrator.
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    You have been logged out.
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label" th:text="#{auth.login.username}">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label" th:text="#{auth.login.password}">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100" th:text="#{auth.login.submit}">Sign In</button>

                <div class="mt-3 text-center">
                    <a href="/register" th:text="#{nav.register}">Register new account</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{layout/fragments :: footer}"></div>
</body>
</html>
