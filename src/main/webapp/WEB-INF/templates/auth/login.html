<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(#{auth.login.title})}"></head>
<body>
<div th:replace="~{layout/fragments :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <h2 class="mb-4 text-center" th:text="#{auth.login.title}">Sign In</h2>

            <div th:replace="~{layout/fragments :: flash-messages}"></div>

            <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="card p-4 shadow-sm">
                
                <div class="mb-3">
                    <label for="email" class="form-label" th:text="#{auth.login.username}">Email</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}" 
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label" th:text="#{auth.login.password}">Password</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" required minlength="6">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100" th:text="#{auth.login.submit}">Sign In</button>

                <div class="mt-3 text-center">
                    <a href="/register" th:text="#{nav.register}">Register new account</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{layout/fragments :: footer}"></div>
</body>
</html>
